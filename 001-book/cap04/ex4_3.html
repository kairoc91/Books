<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4.3</title>
</head>

<body>
    <script>
        const bairro = prompt("Bairro de entrega: ");
        let taxaEntrega
        switch (bairro) {
            case "Centro":
                taxaEntrega = 5.00;
                break;
            case "Fragata": //em casos de bairros com a mesma taxa, podemos escrevê-los um abaixo do outro
            case "Três Vendas": //os valores serão os mesmos para todos os casos que vierem antes do break
                taxaEntrega = 7.00;
                break;
            case "Laranjal":
                taxaEntrega = 10.00;
                break;
            default:
                taxaEntrega = 8.00;
                break;
        }
        alert(`Taxa R$: ${taxaEntrega.toFixed(2)}`);
    </script>
</body>

</html>
