<!DOCTYPE html>
<html lang="pr-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inicial-scale=1.0">
        <link rel="stylesheet" type="text/css" href="css/estilos.css">
        <title>Exercício 5.5</title>
    </head>
    <body>
        <img src="img/ex5_5.jpg" class="alta" alt="Contas do mês">
        <h1>Programa contas do mês</h1>
        <form>
            <p>Descrição da conta: 
                <input type="text" id="inDescricao" required>
            </p>
            <p>Valor a pagar R$: 
                <input type="number" id="inValor" min="0" step="0.01" required>
            </p>
            <p>
                <input type="submit" value="Registrar conta">
            </p>
            <pre id="outResp1"></pre>
            <pre id="outResp2"></pre>
        </form>
        <script src="js/ex5_5.js"></script>
    </body>

</html>
