<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 6.2</title>
    <link rel="stylesheet" type="text/css" href="css/estilos.css">
</head>

<body>
    <img src="img/ex6_2.jpg" class="normal" alt="Números">
    <h1>Jogo descubra o número</h1>
    <form>
        <p>Número:
            <input type="number" id="inNumero" required>
            <input type="submit" id="btSubmit" value="Apostar">
            <input type="button" id="btNovo" class="oculta" value="Jogar novamente">
        </p>
        <h3>Erros: <span id="outErros"></span></h3>
        <h3>Chances: <span id="outChances"></span></h3>
        <h3 id="outDica" class="italico">Dica: é um número de 1 a 100.</h3>
    </form>
    <script src="js/ex6_2.js"></script>
</body>

</html>
